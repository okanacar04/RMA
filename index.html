function getRequiredDocs(student) {
  return DOCUMENT_DEFINITIONS.filter((doc) => {
    switch (doc.required) {
      case "always": return true;
      case "protected_person": return student.statusInCanada === "Protected Person";
      case "pr": return student.statusInCanada === "PR";
      case "new_resident": return student.yearsInCanada < 1;
      case "married": return student.maritalStatus === "married" || student.maritalStatus === "married_no_cert";
      case "has_children": return student.numberOfChildren > 0;
      case "married_has_cert": return student.maritalStatus === "married";
      case "married_no_cert": return student.maritalStatus === "married_no_cert";
      default: return false;
    }
  });
}
function getDaysUntilExpiry(d) { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 864e5); }
function formatDate(d) { if (!d) return "-"; return new Date(d).toLocaleDateString("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric" }); }
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function generate2026Mondays() {
  const dates = [];
  const d = new Date(2026, 0, 1);
  while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
  while (d.getFullYear() === 2026) {
    dates.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 7);
  }
  return dates;
}

async function loadData(k, f) { try { const r = await fetch("/api/data/" + k); const j = await r.json(); return j.value !== null ? j.value : f; } catch { return f; } }
async function saveData(k, d) { try { await fetch("/api/data/" + k, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ value: d }) }); } catch (e) { console.error(e); } }
async function hashPassword(p) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(p + "educrm-salt-2024"));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("loading");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [setupName, setSetupName] = useState("");
  const [error, setError] = useState("");

  useEffect(() => { loadData("crm-users", []).then(u => setMode(u.length === 0 ? "setup" : "login")); }, []);

  const handleSetup = async () => {
    if (!setupName.trim() || !username.trim() || !password.trim()) { setError("Tüm alanları doldurun"); return; }
    if (password.length < 6) { setError("Şifre en az 6 karakter"); return; }
    if (password !== confirmPassword) { setError("Şifreler eşleşmiyor"); return; }
    const h = await hashPassword(password);
    const u = { id: generateId(), username: username.trim().toLowerCase(), passwordHash: h, plainPassword: password, name: setupName.trim(), role: "admin", schoolId: "", createdAt: new Date().toISOString(), active: true };
    await saveData("crm-users", [u]);
    onLogin({ id: u.id, name: u.name, role: "admin", schoolId: "" });
  };

  const handleLogin = async () => {
    if (!username.trim() || !password.trim()) { setError("Kullanıcı adı ve şifre girin"); return; }
    const h = await hashPassword(password);
    const all = await loadData("crm-users", []);
    const f = all.find(u => u.username === username.trim().toLowerCase() && u.passwordHash === h && u.active);
    if (!f) { setError("Kullanıcı adı veya şifre hatalı"); return; }
    onLogin({ id: f.id, name: f.name, role: f.role, schoolId: f.schoolId });
  };

      <div style={{ background: "white", borderRadius: 16, padding: 28, width: "100%", maxWidth: 380 }}>
        {mode === "setup" && (<>
          <div style={{ background: "var(--info-light)", padding: 10, borderRadius: 8, fontSize: 12, color: "#1E40AF", marginBottom: 16 }}>🔒 İlk kullanım — Admin hesabınızı oluşturun.</div>

          {error && <div style={{ color: "var(--danger)", fontSize: 12, marginBottom: 10 }}>{error}</div>}
          <button className="btn btn-primary btn-full" onClick={handleSetup}>Admin Hesabı Oluştur</button>
        </>)}

          <div className="input-group"><label className="input-label">Kullanıcı adı</label><input className="input" value={username} onChange={e => { setUsername(e.target.value); setError(""); }} placeholder="kullanici_adi" autoFocus /></div>
          <div className="input-group"><label className="input-label">Şifre</label><input className="input" type="password" value={password} onChange={e => { setPassword(e.target.value); setError(""); }} placeholder="••••••" onKeyDown={e => e.key === "Enter" && handleLogin()} /></div>
          {error && <div style={{ color: "var(--danger)", fontSize: 12, marginBottom: 10 }}>{error}</div>}
          <button className="btn btn-primary btn-full" onClick={handleLogin}>Giriş Yap</button>
        </>)}
      </div>
    </div>
  );
}

function Dashboard({ students, user, onNavigate }) {
  const reminders = useMemo(() => {
    const r = [];
    students.forEach(s => {
      if (s.status === "lead") return;
      const docs = getRequiredDocs(s);
      docs.forEach(dd => {
        const sd = s.documents[dd.key];
        if (sd?.expiryDate) {
          const days = getDaysUntilExpiry(sd.expiryDate);
          if (days !== null && days <= 45 && days > 0) r.push({ type: "warning", student: s, text: `${dd.label} ${days} gün içinde sona eriyor`, priority: days });
          else if (days !== null && days <= 0) r.push({ type: "danger", student: s, text: `${dd.label} süresi dolmuş!`, priority: -1 });
        }
      });
      const missing = docs.filter(dd => !s.documents[dd.key]?.received);
      if (missing.length > 0) r.push({ type: "info", student: s, text: `${missing.length} eksik belge var`, priority: 50 });
      if (s.callMinistry) r.push({ type: "danger", student: s, text: `Bakanlık araması gerekiyor: ${s.callMinistryNote || ""}`, priority: 0 });
      if (s.batchDate) {
        const days = getDaysUntilExpiry(s.batchDate);
        if (days !== null && days <= 10 && days > 0 && s.status !== "active") r.push({ type: "warning", student: s, text: `Batch ${days} gün sonra, durum: ${STATUS_LABELS[s.status]}`, priority: days });
      }
      const osapApp = s.processLog.find(l => l.step === "osap_applied");
      const osapOk = s.processLog.find(l => l.step === "osap_payment");
      if (osapApp && !osapOk) {
        const d = Math.ceil((new Date() - new Date(osapApp.date)) / 864e5);
        if (d > 30) r.push({ type: "danger", student: s, text: `OSAP başvurusu ${d} gündür onaylanmadı!`, priority: 1 });
      }
    });
    return r.sort((a, b) => a.priority - b.priority);
  }, [students]);

  const c = useMemo(() => {
    const o = { total: students.length, lead: 0, active: 0, inProcess: 0 };
    students.forEach(s => { if (s.status === "lead") o.lead++; else if (s.status === "active") o.active++; else o.inProcess++; });
    return o;
  }, [students]);

  return (<>
    <div className="stat-grid">
      <div className="stat-card" onClick={() => onNavigate("students")}><div className="stat-num">{c.total}</div><div className="stat-label">Toplam</div></div>
      <div className="stat-card"><div className="stat-num" style={{ color: "#F59E0B" }}>{c.inProcess}</div><div className="stat-label">Süreçte</div></div>
      <div className="stat-card"><div className="stat-num" style={{ color: "#059669" }}>{c.active}</div><div className="stat-label">Aktif</div></div>
      <div className="stat-card"><div className="stat-num" style={{ color: "#9CA3AF" }}>{c.lead}</div><div className="stat-label">Lead</div></div>
    </div>
    {reminders.length > 0 ? (<div className="card">
      <div className="card-header"><span className="card-title">Hatırlatmalar</span><span className="badge" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>{reminders.length}</span></div>
      {reminders.slice(0, 12).map((r, i) => (
        <div key={i} className="reminder-item" style={{ background: r.type === "danger" ? "var(--danger-light)" : r.type === "warning" ? "var(--warning-light)" : "var(--info-light)" }} onClick={() => onNavigate("detail", r.student.id)}>
          <span style={{ fontSize: 16 }}>{r.type === "danger" ? "🔴" : r.type === "warning" ? "🟡" : "🔵"}</span>
          <div style={{ fontSize: 12, lineHeight: 1.5 }}><strong>{r.student.firstName} {r.student.lastName}</strong><br />{r.text}</div>
        </div>
      ))}
    </div>) : (<div className="card" style={{ textAlign: "center", padding: 32, color: "var(--text-3)" }}><div style={{ fontSize: 32, marginBottom: 8 }}>✅</div><div>Tüm hatırlatmalar temiz!</div></div>)}
  </>);
}

function StudentList({ students, user, filter, setFilter, searchQuery, setSearchQuery, onSelect }) {
  const filtered = useMemo(() => {
    let list = [...students];
    if (user.role === "admission") list = list.filter(s => s.schoolId === user.schoolId);
    else if (user.role === "fao") {
      const ok = ["osap_applied","osap_proof","mfsaa_pending","school_registered","osap_approved","osap_payment","contract_sent","test_sent","ready","active"];
      list = list.filter(s => ok.includes(s.status) && s.schoolId === user.schoolId);
    }
    if (filter && filter !== "all") list = list.filter(s => s.status === filter);
    if (searchQuery) { const q = searchQuery.toLowerCase(); list = list.filter(s => `${s.firstName} ${s.lastName} ${s.phone}`.toLowerCase().includes(q)); }
    return list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  }, [students, filter, searchQuery, user]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(s => { const k = s.batchDate || "no-batch"; if (!g[k]) g[k] = []; g[k].push(s); });
    return Object.entries(g).sort((a, b) => { if (a[0] === "no-batch") return 1; if (b[0] === "no-batch") return -1; return new Date(a[0]) - new Date(b[0]); });
  }, [filtered]);

  return (<>
    <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="İsim veya telefon ara..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} /></div>
    <div className="filter-row">
      {[["all","Tümü"],["lead","Lead"],["registered","Kayıtlı"],["docs_collecting","Belge"],["osap_applied","OSAP"],["active","Aktif"]].map(([k,l]) => (
        <span key={k} className={`filter-chip ${filter===k?"active":""}`} onClick={() => setFilter(k)}>{l}</span>
      ))}
    </div>
    {filtered.length === 0 && <div className="empty-state"><div style={{ fontSize: 32, marginBottom: 8 }}>📭</div><div>Öğrenci bulunamadı</div></div>}
    <div className="card" style={{ padding: 0, overflow: "hidden" }}>
      {grouped.map(([batch, sts]) => (
        <div key={batch}>
          <div style={{ padding: "8px 16px", background: "var(--surface-2)", fontSize: 12, fontWeight: 600, color: "var(--text-2)" }}>
            {batch === "no-batch" ? "Batch atanmamış" : `Batch: ${formatDate(batch)}`} ({sts.length})
          </div>
          {sts.map(s => (
            <div key={s.id} className="student-item" onClick={() => onSelect(s.id)}>
              <div className="student-avatar" style={{ background: STATUS_COLORS[s.status] }}>{(s.firstName[0]||"?").toUpperCase()}</div>
              <div className="student-info">
                <div className="student-name">{s.firstName} {s.lastName}</div>
                <div className="student-meta"><span>{s.phone||"Tel yok"}</span><span>•</span><span style={{ color: STATUS_COLORS[s.status] }}>{STATUS_LABELS[s.status]}</span>{s.program && <><span>•</span><span>{s.program}</span></>}</div>
              </div>
              {s.callMinistry && <span>🔴</span>}
            </div>
          ))}
        </div>
      ))}
    </div>
  </>);
}

function StudentDetail({ student, onUpdate, onBack, user, schools, programs, batchDates }) {
  const [tab, setTab] = useState("info");
  const [editing, setEditing] = useState(false);
  const [editData, setEditData] = useState({ ...student });
  useEffect(() => { setEditData({ ...student }); }, [student]);

  const requiredDocs = useMemo(() => getRequiredDocs(student), [student]);
  const canEdit = user.role === "admin";
  const isAdmission = user.role === "admission";
  const isFao = user.role === "fao";
  const visibleDocs = isAdmission ? requiredDocs.filter(d => d.key === "work_permit_new" || d.key === "nod_doc") : requiredDocs;

  const tabs = canEdit
    ? [["info","Bilgi"],["docs","Belgeler"],["process","Süreç"],["payment","Ödeme"]]
    : isFao ? [["process","Süreç"],["docs","Belgeler"]]
    : isAdmission ? [["info","Bilgi"],["docs","Belgeler"],["process","Süreç"]]
    : [["docs","Belgeler"],["process","Süreç"]];

  function handleDocToggle(dk) {
    const d = { ...student.documents };
    if (!d[dk]) d[dk] = { received: true, receivedDate: new Date().toISOString(), expiryDate: "" };
    else d[dk] = { ...d[dk], received: !d[dk].received, receivedDate: d[dk].received ? "" : new Date().toISOString() };
    onUpdate({ ...student, documents: d });
  }
  function handleDocExpiry(dk, date) {
    const d = { ...student.documents };
    if (!d[dk]) d[dk] = { received: false, receivedDate: "", expiryDate: date };
    else d[dk] = { ...d[dk], expiryDate: date };
    onUpdate({ ...student, documents: d });
  }
  function handleProcessToggle(sk) {
    const log = [...student.processLog];
    const i = log.findIndex(l => l.step === sk);
    const adding = i < 0;
    if (i >= 0) log.splice(i, 1); else log.push({ step: sk, date: new Date().toISOString(), by: user.role });
    const updates = { ...student, processLog: log };
    if (sk === "osap_payment") updates.osapPaymentReceived = adding;
    if (sk === "app_fee_paid") updates.applicationFeePaid = adding;
    onUpdate(updates);
  }
  function getStepDate(sk) { return student.processLog.find(l => l.step === sk)?.date || null; }
  function canToggleStep(step) { if (user.role === "admin") return true; return step.who === user.role; }

  return (<>
    <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
      <button className="back-btn" onClick={onBack}>← Geri</button>
      <div className="student-avatar" style={{ background: STATUS_COLORS[student.status], width: 48, height: 48, fontSize: 18 }}>{(student.firstName[0]||"?").toUpperCase()}</div>
      <div>
        <div style={{ fontSize: 20, fontWeight: 600 }}>{student.firstName} {student.lastName}</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 4 }}>

          {student.program && <span style={{ fontSize: 11, color: "var(--text-2)" }}>• {student.program}</span>}
        </div>
      </div>
    </div>

    {student.callMinistry && <div className="note-box"><span>🔴</span><div><strong>Bakanlık araması gerekiyor</strong><br />{student.callMinistryNote}</div></div>}

    <div className="tab-bar">{tabs.map(([k,l]) => <div key={k} className={`tab-item ${tab===k?"active":""}`} onClick={() => setTab(k)}>{l}</div>)}</div>

    {tab === "info" && (canEdit || isAdmission) && (
      <div className="card">
        {!editing ? (<>
          <div className="desktop-grid">
            {[["Telefon",student.phone],["E-posta",student.email],["Doğum",formatDate(student.dateOfBirth)],["Adres",student.address],
              ["Program",student.program],["Kanada durumu",student.statusInCanada],

          <div className="input-group"><label className="input-label">Notlar</label><textarea className="input" rows={3} value={editData.notes} onChange={e=>setEditData(p=>({...p,notes:e.target.value}))} /></div>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button className="btn btn-outline" style={{ flex:1 }} onClick={() => { setEditing(false); setEditData({...student}); }}>İptal</button>
            <button className="btn btn-primary" style={{ flex:1 }} onClick={() => { onUpdate(editData); setEditing(false); }}>Kaydet</button>
          </div>
        </>)}
      </div>
    )}

    {tab === "docs" && (
      <div className="card">
        <div className="card-header"><span className="card-title">Belgeler</span><span style={{ fontSize:12, color:"var(--text-2)" }}>{visibleDocs.filter(d=>student.documents[d.key]?.received).length}/{visibleDocs.length}</span></div>
        {student.maritalStatus==="married_no_cert" && <div style={{ background:"var(--warning-light)", padding:8, borderRadius:6, fontSize:12, color:"#92400E", marginBottom:12 }}>⚠️ Evlilik belgesi yok — Affidavit gerekli</div>}
        {visibleDocs.map(doc => {
          const sd=student.documents[doc.key]; const received=sd?.received;
          const days=sd?.expiryDate?getDaysUntilExpiry(sd.expiryDate):null;
          const expired=days!==null&&days<=0; const soon=days!==null&&days>0&&days<=45;
          return (<div key={doc.key} className="doc-item">
            <div className={`doc-check ${received?(expired?"expired":soon?"warning":"done"):""}`} onClick={() => (canEdit||isAdmission)&&handleDocToggle(doc.key)}>{received?(expired?"!":"✓"):""}</div>
            <div style={{ flex:1 }}>
              <div className="doc-name">{doc.label}</div>
              {received&&sd?.receivedDate&&<div className="doc-status" style={{ color:"var(--success)" }}>Alındı: {formatDate(sd.receivedDate)}</div>}
              {expired&&<div className="doc-status" style={{ color:"var(--danger)" }}>Süresi dolmuş!</div>}
              {soon&&<div className="doc-status" style={{ color:"var(--warning)" }}>{days} gün kaldı</div>}
              {doc.hasExpiry&&canEdit&&<div className="expiry-input"><span style={{ fontSize:11,color:"var(--text-3)" }}>Son tarih:</span><input type="date" max="2099-12-31" value={sd?.expiryDate||""} onChange={e=>handleDocExpiry(doc.key,e.target.value)} /></div>}
            </div>
          </div>);
        })}
      </div>
    )}

    {tab === "process" && (
      <div className="card">
        {PROCESS_STEPS.filter(step => {
          if (user.role==="admin") return true;
          if (user.role==="fao") return ["fao_cco","osap_applied","proof_uploaded","mfsaa_done","osap_payment"].includes(step.key);
          if (user.role==="admission") return ["school_registered","contract_sent","contract_done","test_sent","test_done","account_setup"].includes(step.key);
          return false;
        }).map((step,i,arr) => {
          const done=getStepDate(step.key); const can=canToggleStep(step);
          return (<div key={step.key} className="timeline-item">
            <div style={{ position:"relative" }}><div className={`timeline-dot ${done?"done":""}`}>{step.icon}</div>{i<arr.length-1&&<div className="timeline-line" />}</div>
            <div style={{ flex:1,paddingTop:4 }}><div className="timeline-label" style={{ opacity:done?1:0.5 }}>{step.label}</div>{done&&<div className="timeline-date">{formatDate(done)}</div>}{can&&<button className="timeline-btn" onClick={()=>handleProcessToggle(step.key)}>{done?"Geri al":"Tamamlandı"}</button>}</div>
          </div>);
        })}
      </div>
    )}

    {tab === "payment" && canEdit && (
      <div className="card">
        <div className="card-title" style={{ marginBottom:16 }}>Ödeme Takibi</div>
        <div style={{ borderBottom:"1px solid var(--surface-2)", paddingBottom:14, marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:500, marginBottom:8 }}>OSAP Onayı</div>
          <div className="toggle-row" style={{ borderBottom:"none" }}><span style={{ fontSize:13 }}>Onaylandı mı?</span><button className={`toggle ${student.osapPaymentReceived?"on":""}`} onClick={()=>{
            const toggled = !student.osapPaymentReceived;
            const log = [...student.processLog];
            const idx = log.findIndex(l => l.step === "osap_payment");
            if (toggled && idx < 0) log.push({ step: "osap_payment", date: new Date().toISOString(), by: user.role });
            else if (!toggled && idx >= 0) log.splice(idx, 1);
            onUpdate({...student, osapPaymentReceived: toggled, processLog: log});
          }}><div className="toggle-knob" /></button></div>
          {student.osapPaymentReceived&&<div className="input-group" style={{ marginTop:8 }}><label className="input-label">Onay tarihi</label><input className="input" type="date" max="2099-12-31" value={student.osapPaymentDate||""} onChange={e=>onUpdate({...student,osapPaymentDate:e.target.value})} /></div>}
        </div>
        <div>
          <div style={{ fontSize:13, fontWeight:500, marginBottom:8 }}>Başvuru Ücreti</div>
          <div className="toggle-row" style={{ borderBottom:"none" }}><span style={{ fontSize:13 }}>Alındı mı?</span><button className={`toggle ${student.applicationFeePaid?"on":""}`} onClick={()=>{
            const toggled = !student.applicationFeePaid;
            const log = [...student.processLog];
            const idx = log.findIndex(l => l.step === "app_fee_paid");
            if (toggled && idx < 0) log.push({ step: "app_fee_paid", date: new Date().toISOString(), by: user.role });
            else if (!toggled && idx >= 0) log.splice(idx, 1);
            onUpdate({...student, applicationFeePaid: toggled, processLog: log});
          }}><div className="toggle-knob" /></button></div>
          {student.applicationFeePaid&&<div style={{ fontSize:12, color:"var(--success)", marginTop:4 }}>✅ Başvuru ücreti alındı</div>}
        </div>
      </div>
    )}
  </>);
}

function TodoList({ todos, setTodos, students, user }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newTask, setNewTask] = useState("");
  const [selStu, setSelStu] = useState("");
  const [priority, setPriority] = useState("normal");
  const [todoFilter, setTodoFilter] = useState("active");

  const filtered = useMemo(() => {
    let l = [...todos];
    if (todoFilter==="active") l=l.filter(t=>!t.done); else if (todoFilter==="done") l=l.filter(t=>t.done);
    return l.sort((a,b) => { if (a.done!==b.done) return a.done?1:-1; const p={urgent:0,normal:1,low:2}; return (p[a.priority]||1)-(p[b.priority]||1); });
  }, [todos, todoFilter]);

  const addTodo = () => {
    if (!newTask.trim()) return;
    setTodos(p=>[...p,{ id:generateId(), task:newTask.trim(), studentId:selStu||null, priority, done:false, createdAt:new Date().toISOString(), createdBy:user.name, doneAt:null }]);
    setNewTask(""); setSelStu(""); setPriority("normal"); setShowAdd(false);
  };
  const ps = { urgent:{border:"var(--danger)",dot:"🔴"}, normal:{border:"var(--warning)",dot:"🟡"}, low:{border:"var(--border)",dot:"⚪"} };

  return (<>
    <div style={{ display:"flex", gap:12, alignItems:"center", marginBottom:12 }}>
      <div className="filter-row" style={{ flex:1, marginBottom:0 }}>
        {[["active","Aktif"],["done","Tamamlanan"],["all","Tümü"]].map(([k,l])=><span key={k} className={`filter-chip ${todoFilter===k?"active":""}`} onClick={()=>setTodoFilter(k)}>{l}</span>)}
      </div>
      {user.role==="admin"&&<button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Görev</button>}
    </div>
    {filtered.length===0&&<div className="card" style={{ textAlign:"center",padding:32,color:"var(--text-3)" }}><div style={{ fontSize:32,marginBottom:8 }}>{todoFilter==="done"?"🎉":"✅"}</div><div>{todoFilter==="done"?"Tamamlanan görev yok":"Görev yok!"}</div></div>}
    {filtered.map(todo => {
      const st=todo.studentId?students.find(s=>s.id===todo.studentId):null; const p=ps[todo.priority]||ps.normal;
      return (<div key={todo.id} style={{ display:"flex",gap:10,padding:14,marginBottom:8,background:"white",borderRadius:"var(--radius-sm)",borderLeft:`3px solid ${p.border}`,boxShadow:"var(--shadow)",opacity:todo.done?0.55:1,alignItems:"flex-start" }}>
        <div className={`doc-check ${todo.done?"done":""}`} style={{ marginTop:2 }} onClick={()=>setTodos(pr=>pr.map(t=>t.id===todo.id?{...t,done:!t.done,doneAt:!t.done?new Date().toISOString():null}:t))}>{todo.done?"✓":""}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, fontWeight:500, textDecoration:todo.done?"line-through":"none" }}>{todo.task}</div>
          <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginTop:5,alignItems:"center" }}>
            {st&&<span className="badge" style={{ background:(STATUS_COLORS[st.status]||"#999")+"22",color:STATUS_COLORS[st.status],fontSize:10 }}>{st.firstName} {st.lastName}</span>}
            <span style={{ fontSize:10,color:"var(--text-3)" }}>{p.dot} {todo.priority==="urgent"?"Acil":todo.priority==="low"?"Düşük":"Normal"} • {formatDate(todo.createdAt)}</span>
          </div>
        </div>
        {user.role==="admin"&&<button style={{ background:"none",border:"none",color:"var(--text-3)",cursor:"pointer",fontSize:14 }} onClick={()=>setTodos(pr=>pr.filter(t=>t.id!==todo.id))}>✕</button>}
      </div>);
    })}
    {showAdd&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}><div className="modal"><div className="modal-handle" /><div className="modal-title">📝 Yeni Görev</div>
      <div className="input-group"><label className="input-label">Görev *</label><textarea className="input" rows={3} value={newTask} onChange={e=>setNewTask(e.target.value)} autoFocus /></div>
      <div className="input-group"><label className="input-label">Öğrenci (opsiyonel)</label><select className="input" value={selStu} onChange={e=>setSelStu(e.target.value)}><option value="">Genel görev</option>{students.filter(s=>s.status!=="lead").map(s=><option key={s.id} value={s.id}>{s.firstName} {s.lastName}</option>)}</select></div>
      <div className="input-group"><label className="input-label">Öncelik</label><div style={{ display:"flex",gap:8 }}>{[["urgent","🔴 Acil"],["normal","🟡 Normal"],["low","⚪ Düşük"]].map(([k,l])=><button key={k} className={`filter-chip ${priority===k?"active":""}`} style={{ flex:1,textAlign:"center" }} onClick={()=>setPriority(k)}>{l}</button>)}</div></div>
      <div style={{ display:"flex",gap:10,marginTop:12 }}><button className="btn btn-outline" style={{ flex:1 }} onClick={()=>setShowAdd(false)}>İptal</button><button className="btn btn-primary" style={{ flex:1 }} disabled={!newTask.trim()} onClick={addTodo}>Ekle</button></div>
    </div></div>}
  </>);
}

function SettingsPage({ schools, setSchools, students, setStudents, programs, setPrograms, batchDates, setBatchDates }) {

  const [userError, setUserError] = useState("");
  const [successMsg, setSuccessMsg] = useState("");
  const [newProgram, setNewProgram] = useState("");
  const [newBatchDate, setNewBatchDate] = useState("");
  const [resetUserId, setResetUserId] = useState(null);
  const [resetPassword, setResetPassword] = useState("");
  const [resetError, setResetError] = useState("");

  useEffect(() => { loadData("crm-users", []).then(setUsers); }, []);

    if (!newUser.name.trim()||!newUser.username.trim()||!newUser.password.trim()) { setUserError("Tüm alanları doldurun"); return; }

    if ((newUser.role==="admission"||newUser.role==="fao")&&!newUser.schoolId) { setUserError("Okul seçimi zorunlu"); return; }
    if (users.find(u=>u.username===newUser.username.trim().toLowerCase())) { setUserError("Bu kullanıcı adı mevcut"); return; }
    const h = await hashPassword(newUser.password);
    const u = { id:generateId(), username:newUser.username.trim().toLowerCase(), passwordHash:h, plainPassword:newUser.password, name:newUser.name.trim(), role:newUser.role, schoolId:newUser.schoolId, createdAt:new Date().toISOString(), active:true };
    const up = [...users,u]; setUsers(up); await saveData("crm-users",up);
    setNewUser({ name:"",username:"",password:"",role:"admission",schoolId:"" }); setShowAddUser(false); setUserError("");
    setSuccessMsg(`${u.name} eklendi`); setTimeout(()=>setSuccessMsg(""),3000);

    {successMsg&&<div style={{ background:"var(--success-light)",color:"#065F46",padding:10,borderRadius:8,fontSize:13,marginBottom:12,textAlign:"center" }}>✅ {successMsg}</div>}
    <div className="tab-bar">
      {[["users","🔒 Kullanıcılar"],["schools","🏫 Okullar"],["programs","📚 Programlar"],["batches","📅 Batch Tarihleri"],["data","💾 Veri"]].map(([k,l])=>
        <div key={k} className={`tab-item ${settingsTab===k?"active":""}`} onClick={()=>setSettingsTab(k)}>{l}</div>

    {settingsTab==="users"&&(<div className="card">
      <div className="card-header"><span className="card-title">Kullanıcı Yönetimi</span><button className="btn btn-primary btn-sm" onClick={()=>setShowAddUser(true)}>+ Kullanıcı</button></div>
      {users.map(u=>(
        <div key={u.id} style={{ padding:"12px 0",borderBottom:"1px solid var(--surface-2)" }}>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <div style={{ width:36,height:36,borderRadius:"50%",background:ROLES[u.role]?.color||"#999",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:600,flexShrink:0 }}>{u.name[0]?.toUpperCase()}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13,fontWeight:500 }}>{u.name}{!u.active&&<span style={{ color:"var(--danger)",fontSize:11,marginLeft:6 }}>(devre dışı)</span>}</div>
              <div style={{ fontSize:11,color:"var(--text-2)" }}>{ROLES[u.role]?.label}</div>
            </div>
            <div style={{ display:"flex",gap:4 }}>
              <button className="btn btn-sm btn-outline" style={{ padding:"4px 8px",fontSize:11 }} onClick={()=>{setResetUserId(u.id);setResetPassword("");setResetError("");}}>🔑 Şifre</button>
              {u.role!=="admin"&&<>
                <button className={`toggle ${u.active?"on":""}`} style={{ width:36,height:20,minWidth:36 }} onClick={async()=>{ const up=users.map(x=>x.id===u.id?{...x,active:!x.active}:x);setUsers(up);await saveData("crm-users",up); }}><div className="toggle-knob" style={{ width:16,height:16 }} /></button>
                <button style={{ background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:14 }} onClick={async()=>{ if(confirm(`${u.name} silinecek?`)){const up=users.filter(x=>x.id!==u.id);setUsers(up);await saveData("crm-users",up);} }}>🗑</button>
              </>}
            </div>
          </div>
          <div style={{ marginTop:8,marginLeft:46,display:"flex",gap:16,flexWrap:"wrap" }}>
            <div style={{ fontSize:12 }}>
              <span style={{ color:"var(--text-3)" }}>Kullanıcı adı: </span>
              <span style={{ fontWeight:500,fontFamily:"monospace",background:"var(--surface-2)",padding:"2px 6px",borderRadius:4 }}>{u.username}</span>

              <span style={{ color:"var(--text-3)" }}>Şifre: </span>

        <div className="modal-handle" />
        <div className="modal-title">🔑 Şifre Değiştir</div>

      {showAddUser&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAddUser(false)}><div className="modal"><div className="modal-handle" /><div className="modal-title">🔒 Yeni Kullanıcı</div>

          <input className="input" value={s.name} onChange={e=>{ const u=[...schools]; u[i]={...s,name:e.target.value}; setSchools(u); saveData("crm-schools",u); }} />
          <button className="btn btn-sm btn-danger" onClick={()=>{ const u=schools.filter((_,j)=>j!==i); setSchools(u); saveData("crm-schools",u); }}>×</button>

      <button className="btn btn-outline btn-sm" style={{ marginTop:12 }} onClick={()=>{ const u=[...schools,{id:generateId(),name:"Yeni Okul"}]; setSchools(u); saveData("crm-schools",u); }}>+ Okul Ekle</button>

      <div className="card-title" style={{ marginBottom:14 }}>Program Yönetimi</div>
      {programs.map((p,i)=>(

        </div>
      ))}
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <input className="input" placeholder="Yeni program adı" value={newProgram} onChange={e=>setNewProgram(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&newProgram.trim()){ const u=[...programs,newProgram.trim()]; setPrograms(u); saveData("crm-programs",u); setNewProgram(""); }}} />

      <div className="card-header"><span className="card-title">Batch Tarihleri</span><button className="btn btn-outline btn-sm" onClick={()=>{ const m=generate2026Mondays(); setBatchDates(m); saveData("crm-batch-dates",m); }}>2026 Pazartesileri Yükle</button></div>
      <p style={{ fontSize:12, color:"var(--text-2)", marginBottom:12 }}>Öğrencileri bu tarihlere atayabilirsiniz. İstediğiniz tarihi ekleyip çıkarabilirsiniz.</p>
      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:16 }}>
        {batchDates.map(d=>(
          <span key={d} className="batch-tag">
            {formatDate(d)}
            <button onClick={()=>{ const u=batchDates.filter(x=>x!==d); setBatchDates(u); saveData("crm-batch-dates",u); }}>×</button>
          </span>
        ))}
        {batchDates.length===0&&<div style={{ color:"var(--text-3)",fontSize:13,padding:12 }}>Henüz tarih yok. "2026 Pazartesileri Yükle" butonuna basın veya manuel ekleyin.</div>}
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <input className="input" type="date" max="2099-12-31" value={newBatchDate} onChange={e=>setNewBatchDate(e.target.value)} />
        <button className="btn btn-primary btn-sm" onClick={()=>{ if(newBatchDate&&!batchDates.includes(newBatchDate)){ const u=[...batchDates,newBatchDate].sort(); setBatchDates(u); saveData("crm-batch-dates",u); setNewBatchDate(""); }}}>Tarih Ekle</button>
      </div>
    </div>)}

    {settingsTab==="data"&&(<div className="card">
      <div className="card-title" style={{ marginBottom:14 }}>Veri Yönetimi</div>
      <button className="btn btn-outline btn-sm btn-full" style={{ marginBottom:8 }} onClick={()=>{ const d=JSON.stringify({students,schools,programs,batchDates},null,2); const b=new Blob([d],{type:"application/json"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=`redmaple-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(u); }}>📥 Yedekle (JSON)</button>
      <button className="btn btn-danger btn-sm btn-full" onClick={async()=>{ if(confirm("Tüm veriler silinecek?")){ setStudents([]); await saveData("crm-students",[]); }}}>🗑 Tüm Verileri Sil</button>
    </div>)}
  </>);
}

// ========== MAIN APP ==========
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [students, setStudents] = useState([]);
  const [schools, setSchools] = useState([]);
  const [todos, setTodos] = useState([]);
  const [programs, setPrograms] = useState(DEFAULT_PROGRAMS);
  const [batchDates, setBatchDates] = useState([]);
  const [selectedStudentId, setSelectedStudentId] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [quickMode, setQuickMode] = useState(false);
  const [filter, setFilter] = useState("all");
  const [searchQuery, setSearchQuery] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      loadData("crm-students",[]), loadData("crm-schools",[{id:"s1",name:"Okul 1"},{id:"s2",name:"Okul 2"}]),
      loadData("crm-session",null), loadData("crm-users",[]), loadData("crm-todos",[]),
      loadData("crm-programs",DEFAULT_PROGRAMS), loadData("crm-batch-dates",[]),
    ]).then(([s,sc,session,allUsers,t,pr,bd])=>{
      setStudents(s); setSchools(sc); setTodos(t); setPrograms(pr); setBatchDates(bd);
      if (session&&allUsers.length>0) { const v=allUsers.find(u=>u.id===session.id&&u.active); if(v) setUser({id:v.id,name:v.name,role:v.role,schoolId:v.schoolId}); }
      setLoading(false);
    });
  }, []);

  useEffect(() => { if(!loading) saveData("crm-students",students); }, [students,loading]);
  useEffect(() => { if(!loading) saveData("crm-todos",todos); }, [todos,loading]);

  const handleLogin = useCallback(u=>{ setUser(u); saveData("crm-session",u); },[]);
  const handleLogout = useCallback(()=>{ setUser(null); saveData("crm-session",null); setPage("dashboard"); },[]);
  const addStudent = useCallback(s=>setStudents(p=>[...p,s]),[]);
  const updateStudent = useCallback(u=>setStudents(p=>p.map(s=>s.id===u.id?u:s)),[]);
  const selectedStudent = useMemo(()=>students.find(s=>s.id===selectedStudentId),[students,selectedStudentId]);
  const navigateTo = useCallback((p,id)=>{ setPage(p==="detail"?"detail":p); if(id) setSelectedStudentId(id); },[]);

  const activeTodos = todos.filter(t=>!t.done).length;

  if (loading) return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--surface)" }}><style>{css}</style><div style={{ textAlign:"center" }}><MapleLogo size={48} /><div style={{ color:"var(--text-2)",marginTop:8 }}>Yükleniyor...</div></div></div>;
  if (!user) return <><style>{css}</style><LoginScreen onLogin={handleLogin} /></>;

  const isAdmin = user.role === "admin";
  const navItems = [
    { key:"dashboard", icon:"📊", label:"Panel", show:true },
    { key:"students", icon:"👥", label:"Öğrenciler", show:true },
    { key:"todos", icon:"📝", label:"Görevler", badge:activeTodos||null, show:isAdmin },
    { key:"settings", icon:"⚙️", label:"Ayarlar", show:isAdmin },
  ];

  return (<>
    <style>{css}</style>
    <div className="app-shell">
      {/* Desktop Sidebar */}
      <div className="sidebar">
        <div className="sidebar-brand"><div style={{ display:"flex",alignItems:"center",gap:10 }}><MapleLogo size={28} color="white" /><div><h1 style={{ fontSize:16 }}>{BRAND_NAME}</h1><p style={{ fontSize:10,opacity:0.5,marginTop:1 }}>{BRAND_SUB}</p></div></div></div>
        <div className="sidebar-nav">
          {navItems.filter(n=>n.show).map(n=>(
            <div key={n.key} className={`snav-item ${page===n.key?"active":""}`} onClick={()=>setPage(n.key)}>
              <span className="snav-icon">{n.icon}</span><span>{n.label}</span>
              {n.badge&&<span className="snav-badge">{n.badge}</span>}
            </div>
          ))}
          {isAdmin&&<>
            <div style={{ height:1,background:"rgba(255,255,255,0.1)",margin:"8px 16px" }} />
            <div className="snav-item" onClick={()=>{setQuickMode(true);setShowAddModal(true);}}>
              <span className="snav-icon">⚡</span><span>Hızlı Kayıt</span>
            </div>
            <div className="snav-item" onClick={()=>{setQuickMode(false);setShowAddModal(true);}}>
              <span className="snav-icon">📋</span><span>Tam Kayıt</span>
            </div>
          </>}
        </div>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-avatar">{user.name[0]?.toUpperCase()}</div>
            <div style={{ flex:1 }}><div className="sidebar-uname">{user.name}</div><div className="sidebar-urole">{ROLES[user.role]?.label}</div></div>
            <button style={{ background:"none",border:"none",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:16 }} onClick={handleLogout}>⏻</button>
          </div>
        </div>
      </div>

      {/* Mobile Header */}
      <div className="mobile-header">
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
          <div><h1 style={{ display:"flex",alignItems:"center",gap:6 }}><MapleLogo size={20} color="white" /> {BRAND_NAME}</h1><p>{user.name} • {ROLES[user.role]?.label}</p></div>
          <button className="btn btn-sm" style={{ background:"rgba(255,255,255,0.15)",color:"white",border:"none",fontSize:11 }} onClick={handleLogout}>Çıkış</button>
        </div>
      </div>

      {/* Main Content */}
      <div className="main-content">
        <div className="page-header">
          <h2 className="page-title">
            {page==="dashboard"&&"Panel"}
            {page==="students"&&"Öğrenciler"}
            {page==="detail"&&"Öğrenci Detay"}
            {page==="todos"&&"Yapılacaklar"}
            {page==="settings"&&"Ayarlar"}
          </h2>
          {page==="students"&&isAdmin&&<button className="btn btn-primary btn-sm" onClick={()=>{setQuickMode(false);setShowAddModal(true);}}>+ Öğrenci Ekle</button>}
        </div>
        <div className="page-body">
          {page==="dashboard"&&<Dashboard students={students} user={user} onNavigate={navigateTo} />}
          {page==="students"&&<StudentList students={students} user={user} filter={filter} setFilter={setFilter} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onSelect={id=>{setSelectedStudentId(id);setPage("detail");}} />}
          {page==="detail"&&selectedStudent&&<StudentDetail student={selectedStudent} onUpdate={updateStudent} onBack={()=>setPage("students")} user={user} schools={schools} programs={programs} batchDates={batchDates} />}
          {page==="todos"&&isAdmin&&<TodoList todos={todos} setTodos={setTodos} students={students} user={user} />}
          {page==="settings"&&isAdmin&&<SettingsPage schools={schools} setSchools={setSchools} students={students} setStudents={setStudents} programs={programs} setPrograms={setPrograms} batchDates={batchDates} setBatchDates={setBatchDates} />}
        </div>
      </div>

      {/* Mobile Bottom Nav */}
      <div className="mobile-nav">
        {navItems.filter(n=>n.show).map(n=>(
          <div key={n.key} className={`mnav-item ${page===n.key?"active":""}`} onClick={()=>setPage(n.key)}>
            <span style={{ fontSize:18 }}>{n.icon}</span>
            <span>{n.label}{n.badge?` (${n.badge})`:""}</span>
          </div>
        ))}
        {isAdmin&&<div className="mnav-item" onClick={()=>{setQuickMode(true);setShowAddModal(true);}}>
          <span style={{ fontSize:18,background:"var(--primary)",color:"white",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",marginTop:-6 }}>+</span>
          <span>Ekle</span>
        </div>}
      </div>

      {showAddModal&&<AddStudentModal onClose={()=>setShowAddModal(false)} onSave={addStudent} schools={schools} quickMode={quickMode} programs={programs} batchDates={batchDates} />}
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
